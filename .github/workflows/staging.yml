name: Staging

on:
  push:
    tags:
      - "staging/v*.*.*-*.*"

permissions:
  contents: write

env:
  ARTIFACT_LINUX_X86_64: typedown-lsp-linux-x86_64
  ARTIFACT_MACOS_X86_64: typedown-lsp-macos-x86_64
  ARTIFACT_MACOS_AARCH64: typedown-lsp-macos-aarch64
  ARTIFACT_WINDOWS_X86_64: typedown-lsp-windows-x86_64.exe

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-24.04
    steps:
      - name: Check tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^staging/v[0-9]+\.[0-9]+\.[0-9]+-[a-zA-Z\-]+\.[0-9]+$ ]]; then
            echo "Tag '${{ github.ref_name }}' does not match expected format staging/vX.Y.Z-label.N"
            exit 1
          fi

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: [validate-tag]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: typedown-lsp
          - os: macos-15
            target: x86_64-apple-darwin
            artifact: typedown-lsp
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: typedown-lsp
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact: typedown-lsp.exe
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # nightly
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.3

      - name: Build
        run: cargo build --locked --release -p typedown-lsp --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: typedown-lsp-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          retention-days: 2

  release:
    name: Publish Prerelease
    needs: [validate-tag, build-binaries]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/typedown-lsp-x86_64-unknown-linux-gnu/typedown-lsp artifacts/${{ env.ARTIFACT_LINUX_X86_64 }}
          mv artifacts/typedown-lsp-x86_64-apple-darwin/typedown-lsp artifacts/${{ env.ARTIFACT_MACOS_X86_64 }}
          mv artifacts/typedown-lsp-aarch64-apple-darwin/typedown-lsp artifacts/${{ env.ARTIFACT_MACOS_AARCH64 }}
          mv artifacts/typedown-lsp-x86_64-pc-windows-msvc/typedown-lsp.exe artifacts/${{ env.ARTIFACT_WINDOWS_X86_64 }}

      - name: Create Prerelease
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2.1.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Staging ${{ github.ref_name }}
          prerelease: true
          files: |
            artifacts/${{ env.ARTIFACT_LINUX_X86_64 }}
            artifacts/${{ env.ARTIFACT_MACOS_X86_64 }}
            artifacts/${{ env.ARTIFACT_MACOS_AARCH64 }}
            artifacts/${{ env.ARTIFACT_WINDOWS_X86_64 }}
