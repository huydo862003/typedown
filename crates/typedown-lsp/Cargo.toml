[package]
name = "typedown-lsp"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "typedown-lsp"
path = "src/bin/main.rs"

[dependencies]
anyhow = "1"
typedown-db = { version = "0.1.0", path = "../typedown-db" }
typedown-syntax = { version = "0.1.0", path = "../typedown-syntax" }
typedown-types = { version = "0.1.0", path = "../typedown-types" }
lsp-types = "0.97"
lsp-server = "0.7"
serde_json = "1"
notify = "7"
ropey = "1.6.1"
